<!doctype html>
<html>
  <head>
    <title>Startup Demo Website</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <h1>My Startup Website</h1>
      <h2 id="mainText">Welcome User</h2>
    </header>

    <section>
      <h3>Content Manipulation</h3>
      <p id="para">This is initial content</p>
      <button id="changeBtn">Change Text</button>
      <button id="addBtn">Add Text</button>
      <button id="removeBtn">Remove Text</button>
    </section>

    <section>
      <h3 id="styleText">Styling Example</h3>
      <button id="styleBtn">Apply Style</button>
      <button id="toggleBtn">Toggle Style</button>
    </section>

    <section>
      <h3>Mouse Events</h3>
      <div id="box">Hover over this box</div>
    </section>

    <section>
      <h3>User Form</h3>
      <form id="form">
        <input type="text" id="name" placeholder="Enter Name" />
        <input type="text" id="email" placeholder="Enter Email" />
        <button type="submit">Submit</button>
      </form>

      <p id="greet"></p>
    </section>

    <section>
      <button id="printBtn">Print Page</button>
    </section>

    <script src="index.js"></script>
  </body>
</html>
