<!doctype html>
<html>
  <head>
    <title>WT Lab 1</title>
  </head>

  <body>
    <h1>Welcome to Web-Technologies Lab-1</h1>

    <h1 id="hello">LAB_01</h1>

    <button onclick="changeText()">Click-Me!</button>
    <button onclick="addText()">Add-Content</button>
    <button onclick="removeText()">Remove-Content</button>
    <button onclick="changeStyle()">Change-Style</button>
    <button id="button5" onclick="toggleStyle()">Toggle-Button</button>

    <h1 id="title">Hello JavaScript Styling</h1>
    <button onclick="changingStyle()">Change Style</button>
    <button onclick="togglingStyle()">Toggle Style</button>

    <p id="para">This is para</p>

    <h2 id="text">Hover over me!</h2>
    <button onclick="buttonClicked()">Click Me</button>

    <div
      id="box"
      onmouseover="mouseOver()"
      onmouseout="mouseOut()"
      style="width: 200px; height: 100px; background-color: lightblue"
    >
      Hover Box
    </div>

    <form onsubmit="formSubmit(event)">
      <input type="text" placeholder="Enter name" required />
      <button type="submit">Submit</button>
    </form>

    <h2 id="greeting"></h2>

    <form onsubmit="validateForm(event)">
      <label
        >Name:
        <input type="text" id="name" />
      </label>

      <label
        >Email:
        <input type="text" id="email" />
      </label>

      <button type="submit">Submit</button>
    </form>

    <button onclick="printPage()">Print Page</button>

    <audio
      src="https://file-examples.com/storage/fe0b4e468569cfcdf9d62a0/2017/11/file_example_MP3_700KB.mp3"
      controls
    ></audio>

    <video width="700" height="400" controls>
      <source
        src="https://file-examples.com/storage/fe0b4e468569cfcdf9d62a0/2017/04/file_example_MP4_480_1_5MG.mp4"
        type="video/mp4"
      />
    </video>

    <iframe
      width="560"
      height="315"
      src="https://www.google.com/url?sa=t&source=web&rct=j&opi=89978449&url=https://www.youtube.com/watch%3Fv%3Dlfmg-EJ8gm4&ved=2ahUKEwja0dCf9tGTAxXZSWwGHRZ7CJEQkPEHegQIFxAB&usg=AOvVaw1B2yR4LAWXtqLBYnaydwJM"
    >
    </iframe>

    <script src="index.js"></script>
  </body>
</html>
