<!doctype html>
<html>
  <head>
    <title>Startup Demo Website</title>
  </head>

  <body>
    <h1>My Startup Website 🚀</h1>

    <h2 id="mainText">Welcome User</h2>

    <!-- Task 4 -->
    <p id="para">This is initial content</p>
    <button id="changeBtn">Change Text</button>
    <button id="addBtn">Add Text</button>
    <button id="removeBtn">Remove Text</button>

    <!-- Task 5 -->
    <h2 id="styleText">Styling Example</h2>
    <button id="styleBtn">Apply Style</button>
    <button id="toggleBtn">Toggle Style</button>

    <!-- Task 6 -->
    <div
      id="box"
      style="width: 200px; height: 100px; background-color: lightblue"
    >
      Hover Me
    </div>

    <!-- Task 7 -->
    <form id="form">
      <input type="text" id="name" placeholder="Enter Name" />
      <input type="text" id="email" placeholder="Enter Email" />
      <button type="submit">Submit</button>
    </form>

    <h3 id="greet"></h3>

    <!-- Print -->
    <button id="printBtn">Print Page</button>

    <script src="index.js"></script>
  </body>
</html>
